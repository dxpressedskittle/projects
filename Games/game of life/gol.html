<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conway's Game of Life</title>
  <link rel="stylesheet" href="gol.css" />
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="hud">
    <button id="btn-play">◼</button>
    <button id="btn-step">▶|</button>
    <button id="btn-clear">🗑</button>
    <button id="btn-reset">↺</button>

    <div class="divider"></div>

    <label for="fps-slider">speed</label>
    <input id="fps-slider" type="range" min="1" max="30" value="10" />
    <span id="fps-val">5</span>

    <div class="divider"></div>

    <div class="stat"><span class="stat-label">cells</span><span id="stat-cells">0</span></div>
    <div class="stat"><span class="stat-label">gen</span><span id="stat-gen">0</span></div>
  </div>

  <script src="gol.js"></script>
</body>
</html>
